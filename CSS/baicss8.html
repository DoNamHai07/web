<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ảnh hoa sen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
        }

        .card {
            position: relative;
            width: 420px;
            height: 420px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card .caption {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 24px;
            padding: 16px 18px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-size: 18px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1506354666786-959d6d497f1a?auto=format&fit=crop&w=800&q=80" alt="Hoa sen">
        <div class="caption">Trong đầm gì đẹp bằng sen</div>
    </div>
</body>
</html>
