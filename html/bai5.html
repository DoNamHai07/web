    <style>
    /* Khung chứa để căn nút về phía bên phải giống trong ảnh */
.payment-container {
    width: 100%;
    max-width: 500px; /* Bạn có thể điều chỉnh kích thước khung cho phù hợp */
    padding: 15px;
    display: flex;
    justify-content: flex-end; /* Căn nút sang bên phải */
    box-sizing: border-box;
}

/* Định dạng thẻ nút thanh toán */
.btn-payment {
    background-color: #ff2a5f; /* Màu hồng cánh sen đậm đặc trưng */
    color: #ffffff;            /* Chữ màu trắng */
    font-family: 'Arial', sans-serif;
    font-size: 16px;
    font-weight: bold;         /* Chữ in đậm */
    padding: 12px 24px;        /* Khoảng cách đệm bên trong nút */
    border: none;              /* Xóa viền mặc định */
    border-radius: 4px;        /* Bo góc nhẹ giống trong ảnh image_092eba.png */
    cursor: pointer;           /* Đổi con trỏ chuột khi di chuyển vào nút */
    transition: background-color 0.2s ease;
}

/* Hiệu ứng khi di chuột vào (Hover) */
.btn-payment:hover {
    background-color: #e62253; /* Tối hơn một chút khi hover */
}
</style>  
</head>
